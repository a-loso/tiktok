<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>จินน้อย</title>
    <link rel="icon" href="https://img.icons8.com/color/96/tiktok--v1.png" type="image/x-icon">
    <style>
        body, html { margin:0; padding:0; background:#000; height:100%; overflow:hidden; }
        .feed { height:100vh; overflow-y:scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
        .feed::-webkit-scrollbar { display:none; }
        .v-container { 
            height:100vh; 
            width:100%; 
            scroll-snap-align:start; 
            scroll-snap-stop:always; 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            overflow:hidden;
            position: relative;
        }
        /* แก้ไขระยะห่างของ Embed */
        .tiktok-embed { margin: 0 !important; }
    </style>
</head>
<body>
    <div class="feed">
        <div class="v-container">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@jinny279403/video/7562934660125281557" data-video-id="7562934660125281557" style="max-width:605px;min-width:325px;">
                    <section><a target="_blank" href="https://www.tiktok.com/@jinny279403/video/7562934660125281557">Loading...</a></section>
                </blockquote>
            </div>
<div class="v-container">
                <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@jinny279403/video/7600405672269843733" data-video-id="7600405672269843733" style="max-width:605px;min-width:325px;">
                    <section><a target="_blank" href="https://www.tiktok.com/@jinny279403/video/7600405672269843733">Loading...</a></section>
                </blockquote>
            </div>
    </div>
    <script>
        // Lazy Load System
        let isLoaded = false;
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting && !entry.target.dataset.ready) {
                    entry.target.dataset.ready = "true";
                    loadTikTok();
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.v-container').forEach(v => observer.observe(v));

        function loadTikTok() {
            if(document.getElementById('tt-sdk')) document.getElementById('tt-sdk').remove();
            const s = document.createElement('script');
            s.id = 'tt-sdk';
            s.src = 'https://www.tiktok.com/embed.js';
            s.async = true;
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
